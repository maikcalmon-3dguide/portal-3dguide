<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial — Portal 3D Guide</title>
<style>
  :root{--azul:#0e4d66;--azul2:#1a6b8a;--verde:#2e9e72;--amber:#f59e0b;--bg:#f0f6fa;--white:#fff;--text:#1c2b36;--gray:#64748b;--light:#e2eef5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .header{background:linear-gradient(135deg,#083244,var(--azul));color:white;padding:16px 28px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.2);}
  .header img{height:56px;width:auto;opacity:1;}
  .header-info{flex:1;}
  .header-info h1{font-size:1.1rem;font-weight:700;margin-bottom:2px;}
  .header-info p{font-size:.8rem;opacity:.8;}
  .header-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 14px;font-size:.8rem;white-space:nowrap;}

  .progress-bar{background:var(--white);border-bottom:1px solid var(--light);padding:14px 28px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .sdot{display:flex;align-items:center;cursor:pointer;flex:1;}
  .sdot:last-child{flex:0;}
  .sdot .circle{width:30px;height:30px;border-radius:50%;background:var(--light);color:var(--gray);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0;transition:all .3s;margin-right:6px;}
  .sdot .lbl{font-size:.72rem;font-weight:600;color:var(--gray);transition:color .2s;}
  .sdot.active .circle{background:var(--azul2);color:white;}
  .sdot.active .lbl{color:var(--azul2);}
  .sdot.done .circle{background:var(--verde);color:white;}
  .sdot.done .lbl{color:var(--verde);}
  .sline{flex:1;height:2px;background:var(--light);margin:0 4px;}
  .sline.done{background:var(--verde);}
  @media(max-width:600px){.sdot .lbl{display:none;}}

  .main{display:flex;gap:24px;padding:24px;max-width:1080px;margin:0 auto;}
  @media(max-width:700px){.main{flex-direction:column;padding:16px;}}

  .mock-form{flex:1.4;background:white;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden;}
  .mock-top{background:linear-gradient(135deg,var(--azul),var(--verde));padding:18px 22px;color:white;}
  .mock-top h2{font-size:1rem;font-weight:700;}
  .mock-top p{font-size:.78rem;opacity:.8;margin-top:3px;}
  .mock-body{padding:20px;}

  .fg{margin-bottom:14px;}
  .fl{display:block;font-size:.7rem;font-weight:700;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
  .fi{width:100%;border:1.5px solid #d1dce5;border-radius:7px;padding:9px 12px;font-size:.88rem;color:var(--text);background:#f8fbfd;font-family:inherit;}
  .fi.filled{border-color:var(--azul2);background:#eff6ff;}
  .fi.hl{border-color:var(--amber);background:#fffbeb;box-shadow:0 0 0 3px rgba(245,158,11,.15);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,.15)}50%{box-shadow:0 0 0 6px rgba(245,158,11,.05)}}
  .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

  /* Odontograma */
  .odo-wrap{background:#f8fbfd;border:1.5px solid #d1dce5;border-radius:8px;padding:14px;user-select:none;}
  .odo-row{display:flex;justify-content:center;gap:2px;margin:2px 0;}
  .odo-nums{display:flex;justify-content:center;gap:2px;margin:3px 0;}
  .on{width:20px;font-size:8px;text-align:center;color:#94a3b8;}
  .tooth{width:20px;height:26px;border-radius:3px 3px 5px 5px;cursor:pointer;transition:all .15s;border:1px solid #7ab3d0;background:#c8dff0;position:relative;}
  .tooth.inf{border-radius:5px 5px 3px 3px;}
  .tooth[data-s="1"]{background:#1a6b8a;border-color:#0e4d66;}
  .tooth[data-s="2"]{background:#dc2626;border-color:#991b1b;}
  .tooth[data-s="3"]{background:#7c3aed;border-color:#5b21b6;}
  .tooth[data-s="4"]{background:#16a34a;border-color:#15803d;}
  .tooth.pulse-hl{border:2px solid var(--amber);box-shadow:0 0 0 2px rgba(245,158,11,.3);animation:pulse 1.5s infinite;}
  .odo-sep{border:none;border-top:1.5px dashed #cbd5e1;margin:5px 0;}
  .odo-leg{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:.75rem;color:var(--gray);flex-wrap:wrap;}

  /* Upload */
  .upload-box{border:2px dashed #d1dce5;border-radius:10px;padding:20px;text-align:center;color:var(--gray);font-size:.85rem;}
  .upload-box.hl{border-color:var(--amber);background:#fffbeb;}

  /* Filestack instruction */
  .filestack-steps{background:#f0fff4;border:1.5px solid var(--verde);border-radius:10px;padding:14px;margin:10px 0;}
  .filestack-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:.83rem;}
  .filestack-step:last-child{margin-bottom:0;}
  .step-num{width:24px;height:24px;border-radius:50%;background:var(--verde);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;}
  .link-demo{background:#1a6b8a;color:white;border-radius:6px;padding:4px 10px;font-size:.78rem;font-family:monospace;display:inline-block;margin:4px 0;}
  .paste-area{border:1.5px dashed var(--amber);border-radius:6px;padding:6px 10px;font-size:.78rem;color:var(--amber);background:#fffbeb;margin:4px 0;}

  /* Botão enviar */
  .btn-enviar{width:100%;padding:13px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--azul2),var(--azul));color:white;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;}
  .btn-enviar.hl{animation:pulse-btn 1s infinite;}
  @keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(14,77,102,.4)}50%{box-shadow:0 0 0 8px rgba(14,77,102,.1)}}
  .btn-once{background:#fff7ed;border:1.5px solid var(--amber);border-radius:8px;padding:8px 12px;font-size:.78rem;color:#92400e;margin-top:6px;display:flex;align-items:center;gap:6px;justify-content:center;}

  /* Sidebar */
  .sidebar{flex:1;display:flex;flex-direction:column;gap:14px;}
  .balloon{background:white;border-radius:14px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.1);border-left:5px solid var(--azul2);}
  .balloon.green{border-left-color:var(--verde);}
  .balloon.amber{border-left-color:var(--amber);}
  .btag{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--azul2);margin-bottom:6px;}
  .balloon.green .btag{color:var(--verde);}
  .balloon.amber .btag{color:var(--amber);}
  .balloon h3{font-size:.98rem;margin-bottom:8px;color:var(--text);}
  .balloon p{font-size:.83rem;color:var(--gray);line-height:1.6;margin-bottom:6px;}
  .balloon p:last-child{margin-bottom:0;}
  .tip{background:#eff6ff;border-radius:7px;padding:9px 12px;font-size:.8rem;color:var(--azul2);margin-top:10px;display:flex;gap:8px;}
  .tip-a{background:#fff7ed;border-radius:7px;padding:9px 12px;font-size:.8rem;color:#92400e;margin-top:10px;display:flex;gap:8px;}

  .nav{display:flex;gap:10px;}
  .btn-p{padding:10px 18px;border-radius:9px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;background:var(--light);color:var(--azul2);}
  .btn-p:hover{background:#d1e8f5;}
  .btn-n{padding:10px 18px;border-radius:9px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;background:var(--azul2);color:white;flex:1;box-shadow:0 2px 8px rgba(26,107,138,.3);}
  .btn-n:hover{background:var(--azul);}
  .sc{text-align:center;font-size:.75rem;color:var(--gray);margin-top:2px;}

  .fade{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .success-box{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:2px solid var(--verde);border-radius:14px;padding:28px;text-align:center;}
  .success-box .ico{font-size:2.8rem;margin-bottom:10px;}
  footer{text-align:center;padding:16px;font-size:.75rem;color:var(--gray);}
</style>
</head>

  INF.forEach(function(n){
    var s=ODO_STATE[n]||0;
    h+='<div class="tooth inf'+(n==36||n==46?' pulse-hl':'')+'" id="t'+n+'" data-n="'+n+'" data-s="'+s+'" onclick="clickTooth('+n+')"></div>';
  });
  h+='</div>';
  // Numeração inferior
  h+='<div class="odo-nums">';
  INF.forEach(function(n){h+='<div class="on">'+n+'</div>';});
  h+='</div>';
  h+='<div class="odo-leg"><span>🔵 Implante</span><span>🔴 Exodontia</span><span>🟣 Imediato</span><span>🟢 Pôntico</span></div>';
  h+='<div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">';
  h+='<label style="font-size:.82rem;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox"> ✅ Protocolo Maxila</label>';
  h+='<label style="font-size:.82rem;display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" checked> ✅ Protocolo Mandíbula</label>';
  h+='</div>';
  h+='</div>';
  return h;
}

function clickTooth(n){
  var cur_s=ODO_STATE[n]||0;
  ODO_STATE[n]=(cur_s%4)+1;
  if(ODO_STATE[n]===0){delete ODO_STATE[n];}
  var el=document.getElementById('t'+n);
  if(!el) return;
  var s=ODO_STATE[n]||0;
  el.setAttribute('data-s',s);
  el.style.background=COLORS[s];
  el.style.borderColor=BORDERS[s];
  el.classList.remove('pulse-hl');
}

function renderStep(n){
  var s=STEPS[n-1];
  document.getElementById('ft').textContent=s.t;
  document.getElementById('fs').textContent=s.s;
  var mb=document.getElementById('mb');
  mb.innerHTML=s.f==='__ODO__'?makeOdo():s.f;
  mb.className='mock-body fade';
  setTimeout(function(){mb.classList.remove('fade');},400);

  var b=document.getElementById('bl');
  var bl=s.b;
  b.className='balloon fade '+(bl.cls||'');
  b.innerHTML='<div class="btag">'+bl.tag+'</div><h3>'+bl.h+'</h3>'+bl.body+
    '<div class="tip"><span>'+(bl.cls==='amber'?'⏰':'💡')+'</span><span>'+bl.tip.replace('💡 ','').replace('⏰ ','')+'</span></div>';
  setTimeout(function(){b.classList.remove('fade');},400);

  for(var i=1;i<=5;i++){
    var d=document.getElementById('sd'+i);
    var l=document.getElementById('sl'+i);
    d.className='sdot'+(i<n?' done':i===n?' active':'');
    if(l) l.className='sline'+(i<n?' done':'');
  }
  document.getElementById('bp').style.display=n===1?'none':'';
  document.getElementById('bn').textContent=n===5?'✅ Concluir Tutorial':'Próximo →';
  document.getElementById('sc').textContent='Passo '+n+' de 5';
}

function next(){if(cur<5){cur++;renderStep(cur);}else showEnd();}
function prev(){if(cur>1){cur--;renderStep(cur);}}
function go(n){cur=n;renderStep(n);}
